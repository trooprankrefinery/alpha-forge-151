repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - alembic
          - anyio
          - exchange-calendars
          - numpy
          - pandas
          - prometheus-client
          - psycopg[binary]
          - structlog
          - pydantic
          - pydantic-settings
          - pyarrow
          - python-dateutil
          - redis
          - sqlalchemy
          - tenacity
        args: [src]
        pass_filenames: false
